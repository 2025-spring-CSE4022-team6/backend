spring:
  config:
    import: optional:file:.env[.properties]

  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 50
      thread-name-prefix: "Async-"

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    defer-datasource-initialization: true # 테이블 다 만든 다음에 data.sql 실행
    show-sql: true
    database: postgresql
    hibernate:
      ddl-auto: create # 테이블 자동 생성 (운영 환경에서는 'none' 또는 'validate' 추천)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect # PostgreSQL에 맞는 Hibernate dialect
        format_sql: true # SQL을 보기 쉽게 출력
        jdbc :
          use_streams_for_binary: true
          lob:
            non_contextual_creation: true
  sql:
    init:
      mode: always


logging:
  level:
    root: debug
  file:
    path: logs/app.log
